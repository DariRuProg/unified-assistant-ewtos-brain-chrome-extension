<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>EwtosBrain</title>
  <link rel="stylesheet" href="../themes.css" />
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <header>
    <input id="tool-search" class="tool-search" type="search" placeholder="Tools suchen…" autocomplete="off" aria-label="Tools suchen" />
    <div class="header-right">
      <div class="status">
        <span id="status-dot" class="dot offline" title="verbinde..."></span>
      </div>
      <button id="dark-toggle" class="dark-toggle" type="button" title="Dark/Light Mode">&#9728;</button>
      <button id="burger-btn" class="burger" type="button" title="Navigation" aria-haspopup="true" aria-expanded="false" aria-controls="nav-sidebar">&#9776;</button>
    </div>
  </header>

  <div class="workspace">
    <div class="work-main">
      <div id="quick-actions" class="quick-actions hidden"></div>

      <div id="offline-banner" class="offline-banner hidden">
        <span id="offline-banner-text">
          <strong>Server nicht erreichbar.</strong>
          Starte die EwtosBrain-Server-App (Tray-Icon) — im Dev per <code>start-server.bat</code>.
        </span>
        <button id="retry-connect" type="button">Erneut verbinden</button>
      </div>

      <main id="content"></main>
    </div>

    <aside id="nav-sidebar" class="nav-sidebar" aria-hidden="true">
      <div id="nav-sidebar-main"></div>
      <div class="nav-sidebar-foot">
        <button id="toggle-favbar" class="nav-item" type="button" title="Schnell-Buttons ein/aus">&#11088;</button>
        <button id="edit-quick-slots" class="nav-item" type="button" title="Schnell-Buttons anpassen">&#9998;</button>
        <div class="nav-divider"></div>
        <button id="open-options" class="nav-item" type="button" title="Einstellungen">&#9881;</button>
        <button id="reconnect" class="nav-item" type="button" title="Neu verbinden">&#8635;</button>
      </div>
    </aside>
  </div>

  <script src="sidepanel.js" type="module"></script>
</body>
</html>
