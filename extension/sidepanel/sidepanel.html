<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>EwtosBrain</title>
  <link rel="stylesheet" href="../themes.css" />
  <link rel="stylesheet" href="renderers/base-view.css" />
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <header>
    <input id="tool-search" class="tool-search" type="search" placeholder="" autocomplete="off" aria-label="" data-i18n-placeholder="sidepanel.search_placeholder" data-i18n-aria-label="sidepanel.search_aria" />
    <div class="header-right">
      <div class="status">
        <span id="status-dot" class="dot offline" title="" data-i18n-title="sidepanel.status_connecting"></span>
      </div>
      <button id="page-chat-btn" class="dark-toggle hidden" type="button" title="Mit dieser Seite chatten">&#127760;</button>
      <button id="view-toggle" class="dark-toggle" type="button" title="" data-i18n-title="sidepanel.view_tiles">&#9638;</button>
      <button id="dark-toggle" class="dark-toggle" type="button" title="" data-i18n-title="sidepanel.dark_light">&#9728;</button>
      <button id="burger-btn" class="burger" type="button" title="" data-i18n-title="sidepanel.nav_toggle" aria-haspopup="true" aria-expanded="false" aria-controls="nav-sidebar">&#9776;</button>
    </div>
  </header>

  <div class="workspace">
    <div class="work-main">
      <div id="quick-actions" class="quick-actions hidden"></div>

      <div id="offline-banner" class="offline-banner hidden">
        <span id="offline-banner-text" data-i18n-html="sidepanel.offline_body"></span>
        <button id="retry-connect" type="button" data-i18n="sidepanel.retry_connect"></button>
      </div>

      <main id="content"></main>
    </div>

    <aside id="nav-sidebar" class="nav-sidebar" aria-hidden="true">
      <div id="nav-sidebar-main"></div>
      <div class="nav-sidebar-foot">
        <button id="toggle-favbar" class="nav-item" type="button" title="" data-i18n-title="sidepanel.favbar_toggle">&#11088;</button>
        <button id="edit-quick-slots" class="nav-item" type="button" title="" data-i18n-title="sidepanel.favbar_edit">&#9998;</button>
        <div class="nav-divider"></div>
        <button id="open-options" class="nav-item" type="button" title="" data-i18n-title="sidepanel.open_settings">&#9881;</button>
        <button id="reconnect" class="nav-item" type="button" title="" data-i18n-title="sidepanel.reconnect">&#8635;</button>
      </div>
    </aside>
  </div>

  <script src="sidepanel.js" type="module"></script>
</body>
</html>
