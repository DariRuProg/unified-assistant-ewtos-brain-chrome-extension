<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>EwtosBrain</title>
  <link rel="stylesheet" href="../themes.css" />
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <header>
    <h1>EwtosBrain</h1>
    <div class="header-right">
      <div class="status">
        <span id="status-dot" class="dot offline"></span>
        <span id="status-text">verbinde...</span>
      </div>
      <button id="dark-toggle" class="dark-toggle" type="button" title="Dark/Light Mode">&#9728;</button>
      <div class="burger-wrap">
        <button id="burger-btn" class="burger" type="button" title="Menü" aria-haspopup="true" aria-expanded="false">&#9776;</button>
        <div id="burger-menu" class="burger-menu hidden" role="menu">
          <button id="view-toggle" type="button" role="menuitem">⊞ Kachel-Ansicht</button>
          <button id="open-options" type="button" role="menuitem">Einstellungen</button>
          <button id="reconnect" type="button" role="menuitem">Neu verbinden</button>
        </div>
      </div>
    </div>
  </header>

  <nav id="tabs" class="tabs"></nav>

  <div id="quick-actions" class="quick-actions"></div>

  <div id="offline-banner" class="offline-banner hidden">
    <strong>Server nicht erreichbar.</strong>
    Starte ihn per Doppelklick auf <code>start-server.bat</code> im Projekt-Ordner.
    <button id="retry-connect" type="button">Erneut verbinden</button>
  </div>

  <main id="content"></main>

  <script src="sidepanel.js" type="module"></script>
</body>
</html>
