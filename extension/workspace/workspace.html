<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EwtosBrain — Datei</title>
  <link rel="stylesheet" href="../themes.css">
  <link rel="stylesheet" href="../sidepanel/renderers/base-view.css">
  <link rel="stylesheet" href="workspace.css">
</head>
<body>
  <header class="ws-topbar">
    <span class="ws-file-path" id="ws-file-path">…</span>
    <span class="ws-vault-name" id="ws-vault-name"></span>
    <span class="ws-spacer"></span>
    <button type="button" id="ws-back-btn" class="ws-btn" disabled title="Zurück zur vorherigen Datei">← Zurück</button>
    <button type="button" id="ws-layout-toggle" class="ws-btn" title="Chat-Position umschalten (unten / seitlich)">Chat: unten</button>
  </header>

  <div class="ws-split" id="ws-split">
    <section class="ws-left">
      <div class="ws-left-toolbar" id="ws-left-toolbar"></div>
      <div class="ws-changed-banner" id="ws-changed-banner" style="display:none">
        <span>Datei wurde durch den Chat geändert.</span>
        <button type="button" id="ws-reload-btn" class="ws-btn">Neu laden</button>
      </div>
      <div class="ws-view" id="ws-view"></div>
      <textarea class="ws-editor" id="ws-editor" style="display:none" spellcheck="false"></textarea>
      <div class="ws-left-status" id="ws-left-status"></div>
    </section>

    <aside class="ws-right">
      <div class="ws-chat-head">
        <span id="ws-chat-title">Chat zur Datei</span>
        <div class="ws-chat-head-actions">
          <button type="button" id="ws-mode-toggle" class="ws-btn" title="Zwischen Datei-Chat und Vault-Chat wechseln">↔ Vault</button>
          <button type="button" id="ws-chat-clear" class="ws-btn" title="Verlauf löschen">✕</button>
        </div>
      </div>
      <div class="ws-chat-options">
        <label><input type="checkbox" id="ws-search-toggle" checked> Volltextsuche</label>
        <label><input type="checkbox" id="ws-activity-toggle" checked> Tool-Aktivität</label>
        <label title="Sparsam = nur Lesen/Suchen (günstiger). Alle = aktiviert Schreiben, SEO, Bilder, Farming."><input type="checkbox" id="ws-tools-full"> Tools: alle</label>
        <button type="button" id="ws-debug-btn" class="ws-btn" style="font-size:11px;padding:1px 7px;margin-left:auto" title="Zeigt was an die KI gesendet wird (System-Prompt, Tools, Verlauf)">⚙ Debug</button>
      </div>

      <dialog id="ws-debug-dialog" style="width:min(720px,96vw);max-height:80vh;overflow:auto;border:1px solid var(--ws-border);border-radius:12px;background:var(--ws-bg);color:var(--ws-text);padding:0">
        <div style="display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--ws-border);position:sticky;top:0;background:var(--ws-panel)">
          <strong style="flex:1">Debug: KI-Kontext</strong>
          <span id="ws-debug-status" style="font-size:12px;color:var(--ws-muted)"></span>
          <button type="button" id="ws-debug-close" class="ws-btn" style="font-size:12px;padding:2px 8px">✕</button>
        </div>
        <div id="ws-debug-body" style="padding:16px;font-size:13px;line-height:1.6"></div>
      </dialog>
      <div class="ws-chat-log" id="ws-chat-log"></div>
      <div class="ws-chat-status" id="ws-chat-status"></div>
      <div class="ws-chat-input-row">
        <textarea class="ws-chat-input" id="ws-chat-input" rows="2" placeholder="Frage oder Anweisung… (Enter = senden, Shift+Enter = Zeilenumbruch)"></textarea>
        <button type="button" id="ws-mic-btn" class="ws-btn" title="Spracheingabe">🎙</button>
        <button type="button" id="ws-chat-send" class="ws-btn ws-btn-primary">Senden</button>
      </div>
    </aside>
  </div>

  <!-- General Chat (chat_mode=general) — versteckt bis JS aktiviert -->
  <div id="ws-general" style="display:none;flex:1 1 auto;flex-direction:column;min-height:0;overflow:hidden">
    <div class="ws-gen-toolbar" id="ws-gen-toolbar">
      <span class="ws-gen-label" id="ws-gen-label">✦ Allgemeiner Chat</span>
      <span class="ws-spacer"></span>
      <button type="button" id="ws-gen-add-model" class="ws-btn">+ 2. Modell</button>
      <button type="button" id="ws-gen-clear" class="ws-btn" title="Verlauf löschen">✕ Verlauf</button>
    </div>
    <div class="ws-gen-cols" id="ws-gen-cols">
      <div class="ws-gen-col" id="ws-gen-col-1">
        <div class="ws-gen-col-head">
          <select class="ws-gen-provider" id="ws-gen-provider-1"></select>
          <select class="ws-gen-model-sel" id="ws-gen-model-1"></select>
          <input type="text" class="ws-gen-model-custom" id="ws-gen-model-custom-1" style="display:none" placeholder="Modell-Name eingeben…">
        </div>
        <div class="ws-chat-log" id="ws-gen-log-1"></div>
        <div class="ws-chat-status" id="ws-gen-status-1"></div>
      </div>
      <div class="ws-gen-col" id="ws-gen-col-2" style="display:none">
        <div class="ws-gen-col-head">
          <select class="ws-gen-provider" id="ws-gen-provider-2"></select>
          <select class="ws-gen-model-sel" id="ws-gen-model-2"></select>
          <input type="text" class="ws-gen-model-custom" id="ws-gen-model-custom-2" style="display:none" placeholder="Modell-Name eingeben…">
        </div>
        <div class="ws-chat-log" id="ws-gen-log-2"></div>
        <div class="ws-chat-status" id="ws-gen-status-2"></div>
      </div>
    </div>
    <div class="ws-gen-input-row">
      <div class="ws-gen-input-hint" id="ws-gen-input-hint"></div>
      <div class="ws-chat-input-row" style="border-top:none;padding:0">
        <textarea class="ws-chat-input" id="ws-gen-input" rows="2" placeholder="Frage oder Anweisung… (Enter = senden, Shift+Enter = Zeilenumbruch)"></textarea>
        <button type="button" id="ws-gen-mic" class="ws-btn" title="Spracheingabe">🎙</button>
        <button type="button" id="ws-gen-send" class="ws-btn ws-btn-primary">Senden</button>
      </div>
    </div>
  </div>

  <script type="module" src="workspace.js"></script>
</body>
</html>
